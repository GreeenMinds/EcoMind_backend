spring.application.name=ecomind-backend
spring.profiles.active=dev

spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=pe.greenminds.ecomind_backend.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

spring.devtools.restart.enabled=false

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.always-use-message-format=true
spring.messages.fallback-to-system-locale=false

documentation.application.description=API de Ecomind
documentation.application.version=1.0.0

authorization.jwt.secret=${JWT_SECRET:ecomind-development-secret-key-change-this-please}
authorization.jwt.expiration.days=${JWT_EXPIRATION_DAYS:7}
authorization.password-reset.expiration.minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}

learning.seed.enabled=true
ranking.seed.enabled=true
iam.seed.enabled=true
iam.seed.email=userexample@gmail.com
iam.seed.password=ecomind123
iam.seed.name=Example User
